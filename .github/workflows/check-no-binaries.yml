name: Check no binary libraries in Git

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fail if prebuilt libraries are tracked
        run: |
          tracked="$(git ls-files | grep -E 'lib/.*\.(so|pyd|dll)' || true)"
          if [ -n "$tracked" ]; then
            echo "Prebuilt libraries must not be committed to Git."
            echo "Distribute them via GitHub Releases instead."
            echo "$tracked"
            exit 1
          fi
          echo "OK: no binary libraries tracked"

      - name: Fail if Git LFS is configured for libraries
        run: |
          if [ -f .gitattributes ] && grep -q 'filter=lfs' .gitattributes; then
            echo "Git LFS must not be used for SDK libraries."
            exit 1
          fi
          echo "OK: no LFS rules"
